            إعادة المحاولة
        </button>

    <script>
        const questions = [
            { q: "إذا تشابه مضلعان، فإن زواياهما المتناظرة تكون:", a: ["متطابقة", "متناسبة", "متكاملة", "متتامة"], c: 0 },
            { q: "إذا كان معامل تشابه مضلعين يساوي <span class='math-ltr'>1</span>، فإن المضلعين:", a: ["متطابقان", "متشابهان فقط", "مختلفان", "متكافئان"], c: 0 },
            { q: "إذا تشابه مضلعان، فإن أطوال أضلاعهما المتناظرة تكون:", a: ["متناسبة", "متطابقة", "متساوية", "متعامدة"], c: 0 },
            { q: "النسبة بين محيطي مضلعين متشابهين تساوي:", a: ["معامل التشابه", "مربع معامل التشابه", "جذر معامل التشابه", "نصف معامل التشابه"], c: 0 },
            { q: "يتشابه المثلثان إذا تطابقت زاويتان في أحدهما مع نظائرهما في الآخر، وتسمى الحالة:", a: ["AA", "SSS", "SAS", "ASA"], c: 0 },
            { q: "إذا رسم مستقيم يوازي أحد أضلاع مثلث ويقطع ضلعيه الآخرين، فإنه يقسمهما إلى قطع أطوالها:", a: ["متناسبة", "متطابقة", "متساوية", "متوازية"], c: 0 },
            { q: "القطعة المنصفة في المثلث توازي أحد الأضلاع وطولها يساوي:", a: ["نصف طوله", "ضعف طوله", "نفس طوله", "ثلث طوله"], c: 0 },
            { q: "في المثلثين المتشابهين، النسبة بين الارتفاعين المتناظرين تساوي:", a: ["معامل التشابه", "مربع المعامل", "جذر المعامل", "ضعف المعامل"], c: 0 },
            { q: "إذا كانت أطوال أضلاع مثلث <span class='math-ltr'>3, 4, 5</span> ومثلث يشبهه معامل تشابهه <span class='math-ltr'>2</span>، فإن أطوال أضلاعه:", a: ["<span class='math-ltr'>6, 8, 10</span>", "<span class='math-ltr'>5, 6, 7</span>", "<span class='math-ltr'>1.5, 2, 2.5</span>", "<span class='math-ltr'>9, 16, 25</span>"], c: 0 },
            { q: "منصف زاوية في مثلث يقسم الضلع المقابل إلى قطعتين النسبة بين طوليهما تساوي النسبة بين:", a: ["طولي الضلعين الآخرين", "طولي الارتفاعين", "طولي المتوسطين", "طولي القطرين"], c: 0 },
            { q: "جميع المربعات تكون دائماً:", a: ["متشابهة", "متطابقة", "متفاوتة الزوايا", "غير متشابهة"], c: 0 },
            { q: "إذا قطع قاطعان ثلاثة مستقيمات متوازية أو أكثر، فإن أجزاء القاطعين تكون:", a: ["متناسبة", "متطابقة دائماً", "متساوية", "متعامدة"], c: 0 },
            { q: "النسبة بين طولي متوسطين متناظرين في مثلثين متشابهين تساوي:", a: ["معامل التشابه", "مربع المعامل", "ضعف المعامل", "نصف المعامل"], c: 0 },
            { q: "قيمة <span class='math-ltr'>x</span> في التناسب <span class='math-ltr'>x / 4 = 15 / 10</span> هي:", a: ["<span class='math-ltr'>6</span>", "<span class='math-ltr'>10</span>", "<span class='math-ltr'>4</span>", "<span class='math-ltr'>15</span>"], c: 0 },
            { q: "إذا كان <span class='math-ltr'>△ABC ~ △DEF</span> فإن الزاوية <span class='math-ltr'>B</span> تناظر وتطابق الزاوية:", a: ["<span class='math-ltr'>E</span>", "<span class='math-ltr'>D</span>", "<span class='math-ltr'>F</span>", "<span class='math-ltr'>A</span>"], c: 0 },
            { q: "الزوج المرتب <span class='math-ltr'>(x, y)</span> لإزاحة النقطة <span class='math-ltr'>(-3, 4)</span> بمقدار وحدتين لليمين هو:", a: ["<span class='math-ltr'>(-1, 4)</span>", "<span class='math-ltr'>(-5, 4)</span>", "<span class='math-ltr'>(-3, 6)</span>", "<span class='math-ltr'>(-3, 2)</span>"], c: 0 },
            { q: "المضلعات التي لها نفس عدد الأضلاع وتكون منتظمة تكون دائماً:", a: ["متشابهة", "متطابقة", "مختلفة الزوايا", "متعامدة"], c: 0 },
            { q: "إذا كان معامل التشابه <span class='math-ltr'>k = 0.5</span> فإن التحويل يسمى:", a: ["تصغير", "تكبير", "تطابق", "انعكاس"], c: 0 },
            { q: "في المثلث، النسبة بين طولي منصفين متناظرين للزوايا تساوي:", a: ["معامل التشابه", "مربع المعامل", "ضعف المعامل", "نصف المعامل"], c: 0 },
            { q: "إذا كانت النسبة بين ضلعي مضلعين متشابهين <span class='math-ltr'>2 : 5</span> فإن نسبة محيطيهما هي:", a: ["<span class='math-ltr'>2 : 5</span>", "<span class='math-ltr'>4 : 25</span>", "<span class='math-ltr'>5 : 2</span>", "<span class='math-ltr'>25 : 4</span>"], c: 0 },
            { q: "المستقيمات المتوازية التي تقطع أجزاء متساوية من قاطع، تقطع أجزاء .... من أي قاطع آخر:", a: ["متساوية", "مختلفة", "متناسبة فقط", "طويلة"], c: 0 },
            { q: "قيمة <span class='math-ltr'>x</span> التي تجعل <span class='math-ltr'>-3x = -15</span> هي:", a: ["<span class='math-ltr'>5</span>", "<span class='math-ltr'>-5</span>", "<span class='math-ltr'>18</span>", "<span class='math-ltr'>-18</span>"], c: 0 },
            { q: "في الزوج المرتب <span class='math-ltr'>(x, y)</span>، الإحداثي الواقع على اليسار هو:", a: ["<span class='math-ltr'>x</span>", "<span class='math-ltr'>y</span>", "<span class='math-ltr'>z</span>", "<span class='math-ltr'>w</span>"], c: 0 },
            { q: "تشابه المثلثات بحالة <span class='math-ltr'>SAS</span> يتطلب تطابق زاوية وتناسب الضلعين:", a: ["المحيطين بها", "المقابلين لها", "البعيدين عنها", "المتطابقين"], c: 0 },
            { q: "القطعة الواصلة بين منتصفي ضلعين في مثلث تسمى قطعة:", a: ["منصفة", "متوسطة", "عمودية", "وتر"], c: 0 },
            { q: "إذا كان معامل التشابه <span class='math-ltr'>k > 1</span> فإن التشابه يسمى:", a: ["تكبيراً", "تصغيراً", "تطابقاً", "إزاحة"], c: 0 },
            { q: "إحداثيات منتصف القطعة التي طرفاها <span class='math-ltr'>(2, 4)</span> و <span class='math-ltr'>(6, 8)</span> هي:", a: ["<span class='math-ltr'>(4, 6)</span>", "<span class='math-ltr'>(8, 12)</span>", "<span class='math-ltr'>(2, 2)</span>", "<span class='math-ltr'>(6, 4)</span>"], c: 0 },
            { q: "المثلثان المتطابقا الأضلاع يكونان دائماً:", a: ["متشابهين", "مختلفين", "قائمي الزاوية", "متطابقي الضلعين فقط"], c: 0 },
            { q: "في المثلث <span class='math-ltr'>ABC</span>، إذا كان <span class='math-ltr'>D</span> منتصف <span class='math-ltr'>AB</span> و <span class='math-ltr'>E</span> منتصف <span class='math-ltr'>AC</span> فإن <span class='math-ltr'>DE / BC</span> يساوي:", a: ["<span class='math-ltr'>1 / 2</span>", "<span class='math-ltr'>2</span>", "<span class='math-ltr'>1</span>", "<span class='math-ltr'>1 / 4</span>"], c: 0 },
            { q: "العدد السالب في الزوج المرتب تظهر إشارته دائماً على:", a: ["يسار العدد", "يمين العدد", "فوق العدد", "تحت العدد"], c: 0 }
        ];

        let shuffledQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let playerName = "";

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            const nameInput = document.getElementById('user-name-input');
            if (nameInput.value.trim().split(" ").length < 3) {
                alert("الرجاء إدخال الاسم الثلاثي كاملاً للمتابعة.");
                return;
            }
            playerName = nameInput.value;
            shuffledQuestions = shuffleArray([...questions]);
            
            // خلط الخيارات لكل سؤال
            shuffledQuestions.forEach(q => {
                let opts = q.a.map((text, index) => ({ text, isCorrect: index === q.c }));
                q.displayOptions = shuffleArray(opts);
            });

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = shuffledQuestions[currentIdx];
            document.getElementById('question-number').innerText = `السؤال ${currentIdx + 1} / 30`;
            document.getElementById('question-text').innerHTML = q.q;
            document.getElementById('progress-fill').style.width = `${((currentIdx) / 30) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.displayOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerHTML = opt.text;
                btn.onclick = () => checkAnswer(btn, opt.isCorrect);
                container.appendChild(btn);
            });

            document.getElementById('next-button').classList.add('hidden');
        }

        function checkAnswer(btn, isCorrect) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                score++;
                document.getElementById('current-score').innerText = `النقاط: ${score}`;
            } else {
                btn.classList.add('wrong');
                // ملاحظة: حسب الطلب لا نظهر الإجابة الصحيحة عند الخطأ
            }

            document.getElementById('next-button').classList.remove('hidden');
        }

        function loadNextQuestion() {
            currentIdx++;
            if (currentIdx < 30) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-name').innerText = playerName;
            document.getElementById('final-score').innerText = `${score} / 30`;
        }
    </script>
</body>
</html>
